<header class="site-header">

  <div class="wrapper">

    <div class="site-title-block">
      <a class="site-title" rel="author" href="{{ "/" | relative_url }}">{{ site.title }}</a>
      <div class="site-subtitle">Physical Oceanography | Coastal Engineering</div>
    </div>

    <nav class="site-nav">
      {%- for page in site.header_pages -%}
        {%- assign my_page = site.pages | where: "path", page | first -%}
        {%- if my_page.title -%}
          <a class="page-link" href="{{ my_page.url | relative_url }}">{{ my_page.title }}</a>
        {%- endif -%}
      {%- endfor -%}
    </nav>

  </div>

</header>
